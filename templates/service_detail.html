{% extends "base.html" %}

{% block content %}
<section class="py-5 bg-navy text-white" style="background-color: #0a1421; padding-top: 100px;">
    <div class="container text-center py-5">
        <h1 class="display-3 fw-bold text-gold">{{ service.title }}</h1>
        <p class="lead opacity-75">{{ service.subtitle }}</p>
    </div>
</section>

<section class="py-5">
    <div class="container py-5">
        <div class="row g-5 align-items-center">
            <div class="col-lg-6">
                <img src="{{ url_for('static', filename='images/' + service.image) }}" class="img-fluid shadow-lg" alt="{{ service.title }}">
            </div>
            <div class="col-lg-6">
                <h2 class="fw-bold mb-4">Service Overview</h2>
                <p class="lead text-muted mb-4">{{ service.full_description }}</p>
                
                <h4 class="fw-bold text-gold mb-3">Core Capabilities:</h4>
                <ul class="list-unstyled">
                    {% for feature in service.features %}
                    <li class="mb-3">
                        <i class="fas fa-check-circle text-gold me-2"></i> {{ feature }}
                    </li>
                    {% endfor %}
                </ul>
                
                <div class="mt-5">
                    <a href="{{ url_for('contact') }}" class="btn btn-gold btn-lg px-4 me-3">INQUIRE ABOUT THIS SERVICE</a>
                    
            </div>
        </div>
    </div>
</section>
{% endblock %}
